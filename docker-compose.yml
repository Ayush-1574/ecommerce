version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: ecommerce_server
    restart: always
    depends_on:
      - postgres
    env_file:
      - ./server/.env
    environment:
      # Override the DB URL to point to the docker container
      DATABASE_URL: postgresql://admin:password123@postgres:5432/ecommerce?schema=public
      CLIENT_BASE_URL: "http://localhost"
      PORT: 5000
    ports:
      - "5000:5000"

  client:
    build: ./client
    container_name: ecommerce_client
    restart: always
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  postgres_data:
